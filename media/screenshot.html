<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pi-todo screenshot source</title>
  <style>
    :root {
      color-scheme: dark;
      --canvas: #0d1117;
      --panel: #0d1117;
      --border: #30363d;
      --divider: #21262d;
      --text: #c9d1d9;
      --muted: #484f58;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
    }

    * { box-sizing: border-box; }

    html, body { margin: 0; min-width: 1038px; min-height: 746px; }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background: var(--canvas);
      font-family: "Cascadia Code", "Cascadia Mono", Consolas, monospace;
    }

    .frame {
      position: relative;
      width: 1038px;
      height: 746px;
      background: var(--canvas);
    }

    .terminal {
      position: absolute;
      top: 220px;
      left: 159px;
      width: 720px;
      height: 305px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .titlebar {
      display: flex;
      align-items: center;
      height: 41px;
      padding: 0 16px;
      border-bottom: 1px solid var(--divider);
      color: #8b949e;
      font-size: 14px;
      line-height: 1;
    }

    .traffic-lights {
      display: flex;
      gap: 8px;
      margin-right: 16px;
    }

    .traffic-lights span {
      display: block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .traffic-lights span:nth-child(1) { background: #ff7b72; }
    .traffic-lights span:nth-child(2) { background: #d29922; }
    .traffic-lights span:nth-child(3) { background: #3fb950; }

    .title { letter-spacing: 0.01em; }

    .content {
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 600;
      line-height: 27px;
      white-space: pre;
    }

    .heading { color: var(--accent); }
    .counts { color: var(--muted); font-weight: 400; }
    .completed { color: var(--success); font-weight: 400; }
    .active { color: var(--warning); }
    .pending { color: var(--text); }
  </style>
</head>
<body>
  <!-- Source composition for media/screenshot.png. Render at 1038 × 746. -->
  <main class="frame" aria-label="pi-todo overlay screenshot">
    <section class="terminal" aria-label="pi-todo terminal preview">
      <header class="titlebar">
        <span class="traffic-lights" aria-hidden="true"><span></span><span></span><span></span></span>
        <span class="title">pi — pi-todo</span>
      </header>
      <div class="content"><span class="heading"># Todos</span><span class="counts"> (3 open, 1 running, 1 completed)</span>
<span class="completed">[✓] Review contracts</span>
<span class="active">[•] Implement heading spacing</span>
<span class="pending">[ ] Add cold-start heuristics</span>
<span class="pending">[ ] Write E2E tests</span></div>
    </section>
  </main>
</body>
</html>
